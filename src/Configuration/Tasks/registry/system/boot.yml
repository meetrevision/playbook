---
title: Configure boot
description: Configure boot settings
privilege: TrustedInstaller
actions:

  # === Disable automatic disk checking on boot
  - !registryValue: {path: 'HKLM\SYSTEM\CurrentControlSet\Control\Session Manager', value: 'BootExecute', type: REG_MULTI_SZ, data: 'autocheck autochk /k:C*'}
