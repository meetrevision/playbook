---
title: Initialization
description: Copies Revision folders/files, and configures some initial settings
privilege: TrustedInstaller
actions:
  
  - !writeStatus: {status: "Initializing"}

  # Prevent annoying notifications during deployment
  - !registryValue:
    path: 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Notifications\Settings\Windows.SystemToast.SecurityAndMaintenance'
    value: 'Enabled'
    type: REG_DWORD
    data: '0'

  - !cmd:
    exeDir: true
    command: 'robocopy "Licenses" "%SystemDrive%\Licenses" /E /PURGE /IM /IT /NP'
    ignoreErrors: true
    weight: 30
    
  - !cmd:
    exeDir: true
    command: 'copy /y "hosts" "%WINDIR%\System32\drivers\etc\hosts"'
    weight: 20

  # Necessary to clean DNS Cache after modifying hosts
  - !cmd:
    command: 'ipconfig /flushdns'

  - !writeStatus: {status: "Installing VCRedist"}
  - !download: 
    url: 'https://aka.ms/vs/17/release/vc_redist.x64.exe'
    destination: "vc_redist.x64.exe"
    overwrite: true
  - !run:
    exeDir: true
    exe: "vc_redist.x64.exe"
    args: '/quiet /norestart'

  - !writeStatus: {status: 'Installing Revision Tool'}
  - !download: 
    url: 'https://github.com/Drizzy07x/revision-tool/releases/download/2.9.1/RevisionTool-Setup.exe'
    destination: "RevisionTool-Setup.exe"
    overwrite: true
  - !run:
    exeDir: true
    exe: "RevisionTool-Setup.exe"
    args: '/VERYSILENT /TASKS="desktopicon"'
    weight: 150

  - !writeStatus: {status: "Applying Revision gaming profile"}
  - !run:
    path: "%ProgramFiles%\\Revision Tool"
    exe: "revitool.exe"
    args: "profile apply gaming --yes"
    wait: true
    runas: currentUserElevated

  - !writeStatus: {status: "Optimizing PowerShell"}
  - !run:
    exeDir: true
    exe: "PowerShell"
    args: '-NoP -ExecutionPolicy Bypass -File ngen.ps1'
    weight: 100
